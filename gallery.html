<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Riverbend Art</title>
    <meta name="description" content="Browse original oil paintings of Montana landscapes, Glacier National Park, wildlife, and Western wilderness by Riverbend Art.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-bg">

    <!-- Always-on Brand Link (mobile, all pages) -->
    <a href="index.html" class="nav__brand nav__brand--fixed">Riverbend Art</a>
    <!-- Navigation -->
    <nav class="nav" id="nav">
        <ul class="nav__links" id="navLinks">
            <li><a href="index.html" class="nav__link">Home</a></li>
            <li><a href="gallery.html" class="nav__link nav__link--active">Gallery</a></li>
            <li><a href="about.html" class="nav__link">About</a></li>
            <li><a href="contact.html" class="nav__link">Contact</a></li>
        </ul>
        <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <h1 class="page-header__title">Gallery</h1>
        <p class="page-header__subtitle">Original works in oil &mdash; Montana, Glacier National Park &amp; beyond</p>
    </header>

    <!-- Gallery Grid -->
    <section class="section" style="padding-top: 0;">
        <div class="section__inner">

            <!-- Filter Tabs -->
            <div class="filters">
                <button class="filters__btn filters__btn--active" data-filter="all">All</button>
                <button class="filters__btn" data-filter="landscape">Landscape &amp; Wildlife</button>
                <button class="filters__btn" data-filter="travel-art">Travel Art</button>
                <button class="filters__btn" data-filter="pet-portraits">Pet Portraits</button>
            </div>

            <!-- Paintings load here from paintings.json -->
            <div class="grid grid--gallery" id="galleryGrid"></div>

        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" id="lightboxClose" aria-label="Close detail view">&times;</button>
        <div class="lightbox__inner">
            <div class="lightbox__image-col">
                <img src="" alt="" class="lightbox__image" id="lightboxImage">
            </div>
            <div class="lightbox__info">
                <h2 class="lightbox__title" id="lightboxTitle"></h2>
                <div class="lightbox__detail">
                    <span class="lightbox__detail-label">Medium</span>
                    <span class="lightbox__detail-value" id="lightboxMedium"></span>
                </div>
                <div class="lightbox__detail">
                    <span class="lightbox__detail-label">Size</span>
                    <span class="lightbox__detail-value" id="lightboxSize"></span>
                </div>
                <div class="lightbox__detail" id="lightboxStatus" style="margin-top: 0.75rem; font-style: italic; color: #8a7e6b; font-size: 0.9rem;"></div>
                <div class="lightbox__detail" style="margin-top: 2rem;">
                    <a href="contact.html" class="view-more">Inquire About This Work</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer__text">&copy; 2026 <span class="footer__brand">Riverbend Art</span>. All rights reserved.</p>
    </footer>

    <script src="js/paintings-data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
